---
AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  Exclude:
    - _snippets/**/*

plugins:
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rake
  - rubocop-sequel

Metrics/BlockLength:
  Enabled: true
  Exclude:
    - app/controllers/*.rb # Roda's nested controllers require large blocks
    - spec/**/*
    - Rakefile # Rake namespaces produce large blocks

Metrics/ClassLength:
  Enabled: true
  Exclude:
    - app/controllers/*.rb # Roda controllers are routing-heavy by design

Security/YAMLLoad:
  Enabled: true
  Exclude:
    - spec/**/*

Style/HashSyntax:
  Enabled: true
  Exclude:
    - Rakefile

Style/SymbolArray:
  Enabled: true
  Exclude:
    - Rakefile
    - db/migrations/*.rb
