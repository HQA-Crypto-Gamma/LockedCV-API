---
# COPY this file to secrets.yml and modify as needed
development:
  DATABASE_URL: sqlite://db/local/development.db
  DB_KEY: <use `rake newkey:db` to generate a secret key>
  HASH_KEY: <use `rake newkey:hash` to generate a secret key>
  SECURE_SCHEME: HTTP

test:
  DATABASE_URL: sqlite://db/local/test.db
  DB_KEY: <use `rake newkey:db` to generate a secret key>
  HASH_KEY: <use `rake newkey:hash` to generate a secret key>
  SECURE_SCHEME: HTTP

production:
  DATABASE_URL: <do not set - assigned by production service>
  DB_KEY: <use `rake newkey:db` to generate a secret key>
  HASH_KEY: <use `rake newkey:hash` to generate a secret key>
  SECURE_SCHEME: HTTPS
